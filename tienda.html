<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda | Monte Alto Roasters</title>
  <meta name="description" content="Descubre la colección de cafés de origen y blends de Monte Alto Roasters.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <section class="page-hero premium-page-hero">
      <div class="container">
        <span class="section-kicker">Colección</span>
        <h1>Nuestra tienda</h1>
        <p>
          Cafés de origen y blends diseñados para distintos perfiles de sabor,
          con una selección cuidada y una presentación premium.
        </p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="shop-toolbar">
          <div class="filter-pills">
            <button class="filter-pill active" data-filter="all">Todos</button>
            <button class="filter-pill" data-filter="Origen único">Origen único</button>
            <button class="filter-pill" data-filter="Blend">Blend</button>
          </div>

          <div class="shop-meta">
            <span id="product-count-label">4 productos</span>
          </div>
        </div>

        <div class="products-grid premium-products" id="shop-products"></div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
</body>
</html>
