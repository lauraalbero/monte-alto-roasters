<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto | Monte Alto Roasters</title>
  <meta name="description" content="Descubre el detalle de nuestros cafés de especialidad en Monte Alto Roasters.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <section class="page-hero premium-page-hero">
      <div class="container">
        <span class="section-kicker">Ficha de producto</span>
        <h1>Nuestra selección</h1>
        <p>
          Cafés escogidos por su perfil sensorial, equilibrio en taza y calidad de origen,
          pensados para una experiencia más cuidada desde la primera compra.
        </p>
      </div>
    </section>

    <section class="back-nav">
      <div class="container">
        <button class="back-button" onclick="history.back()">← Volver</button>
      </div>
    </section>

    <section class="product-detail">
      <div class="container" id="product-detail-content"></div>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
